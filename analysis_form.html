<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Eligibility - PayGain</title>
    <link rel="icon" type="image/png" href="assets/images/Logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        const params = new URLSearchParams(window.location.search);
        const product = params.get('product') || 'life';
        const target = `contact.html?product=${encodeURIComponent(product)}&v=20260508`;
        window.location.replace(target);
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-lg bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center">
        <img src="assets/images/pg_logo_no_background.png" alt="PayGain Logo" class="h-14 w-auto object-contain mx-auto mb-6">
        <h1 class="text-2xl font-bold text-slate-900 mb-3">Opening the Requirement Form</h1>
        <p class="text-slate-500 mb-6">
            PayGain now uses one detailed requirement form for all products.
        </p>
        <a id="continueLink" href="contact.html?product=life&v=20260508" class="inline-flex items-center justify-center gap-2 w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg transition">
            Continue to Requirement Form <i class="fas fa-arrow-right"></i>
        </a>
        <div class="mt-6 flex items-center justify-center gap-4 text-sm">
            <a href="index.html" class="text-slate-500 hover:text-pink-500 font-semibold">Home</a>
            <a href="pulse.html" class="text-slate-500 hover:text-pink-500 font-semibold">PayGain Pulse</a>
        </div>
    </main>

    <script>
        document.getElementById('continueLink').href = target;
    </script>
</body>
</html>
